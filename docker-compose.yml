version: "3.9"

services:
  # ── Streamlit Dashboard ──────────────────────────────────────────────────────
  app:
    build: .
    container_name: upi-fraud-app
    ports:
      - "8501:8501"
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - MONGO_DB=upi_fraud_db
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=upi_transactions
    volumes:
      - ./data:/app/data
      - ./ml/model.pkl:/app/ml/model.pkl
      - ./ml/encoder.pkl:/app/ml/encoder.pkl
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: upi-fraud-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Zookeeper (Kafka dependency) ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: upi-fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  # ── Kafka Broker ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: upi-fraud-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    restart: unless-stopped

volumes:
  mongo_data:
